<text x="70" y="780" fill="#24292F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="start"><tspan x="70" dy="0">Business and</tspan><tspan x="70" dy="36">data tools</tspan></text>
<text x="70" y="865" fill="#57606A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start"><tspan x="70" dy="0">Desktop and web utilities for importing, validating, transforming</tspan><tspan x="70" dy="27">and querying operational data while reducing repetitive manual work.</tspan></text>
