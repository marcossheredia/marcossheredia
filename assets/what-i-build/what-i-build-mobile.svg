<text x="70" y="1295" fill="#24292F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="start"><tspan x="70" dy="0">Offline OCR and</tspan><tspan x="70" dy="36">document processing</tspan></text>
<text x="70" y="1380" fill="#57606A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start"><tspan x="70" dy="0">Self-contained services for recognizing text and codes from</tspan><tspan x="70" dy="27">logistics labels, images, PDFs and TIFF documents without depending</tspan><tspan x="70" dy="27">on internet access.</tspan></text>
