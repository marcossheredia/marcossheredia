<text x="70" y="265" fill="#24292F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="start"><tspan x="70" dy="0">Industrial monitoring</tspan><tspan x="70" dy="36">and integration</tspan></text>
<text x="70" y="350" fill="#57606A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start"><tspan x="70" dy="0">Applications that communicate with operational systems, interpret</tspan><tspan x="70" dy="27">machine data, visualize live states and expose safe control or</tspan><tspan x="70" dy="27">diagnostic workflows.</tspan></text>
