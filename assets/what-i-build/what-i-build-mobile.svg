<text x="70" y="1810" fill="#24292F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="start"><tspan x="70" dy="0">Full-stack and local-first</tspan><tspan x="70" dy="36">platforms</tspan></text>
<text x="70" y="1895" fill="#57606A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start"><tspan x="70" dy="0">Authenticated applications with REST APIs, relational databases,</tspan><tspan x="70" dy="27">responsive interfaces, containerized services and local or cloud-</tspan><tspan x="70" dy="27">backed persistence.</tspan></text>
