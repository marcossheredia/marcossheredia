<circle cx="620.5" cy="212" r="25" fill="#941C2F"/>
<text x="620.5" y="220" fill="#EBEBEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">02</text>
<text x="475" y="278" fill="#03191E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="start"><tspan x="475" dy="0">Business and</tspan><tspan x="475" dy="34">data tools</tspan></text>
<text x="475" y="360" fill="#738290" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start"><tspan x="475" dy="0">Desktop and web utilities for</tspan><tspan x="475" dy="25">importing, validating, transforming</tspan><tspan x="475" dy="25">and querying operational data while</tspan><tspan x="475" dy="25">reducing repetitive manual work.</tspan></text>
<line x1="470" y1="536" x2="753" y2="536" stroke="#941C2F" stroke-width="4" stroke-linecap="round"/>
<circle cx="620.5" cy="536" r="8" fill="#941C2F" stroke="#EBEBEB" stroke-width="4"/>
