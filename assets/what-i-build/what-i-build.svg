<text x="225.0" y="220" fill="#EBEBEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">01</text>
<text x="58" y="278" fill="#03191E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="start"><tspan x="58" dy="0">Industrial monitoring</tspan><tspan x="58" dy="34">and integration</tspan></text>
<text x="58" y="360" fill="#738290" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start"><tspan x="58" dy="0">Applications that communicate with</tspan><tspan x="58" dy="25">operational systems, interpret machine</tspan><tspan x="58" dy="25">data, visualize live states and expose</tspan><tspan x="58" dy="25">safe control or diagnostic workflows.</tspan></text>
<line x1="56" y1="536" x2="368" y2="536" stroke="#941C2F" stroke-width="4" stroke-linecap="round"/>
<circle cx="225.0" cy="536" r="8" fill="#941C2F" stroke="#EBEBEB" stroke-width="4"/>
<path d="M410 30 H765 L815 300 L765 570 H410 L460 300 Z" fill="#EBEBEB" stroke="#738290" stroke-width="2"/>
<circle cx="620.5" cy="112" r="58" fill="#EBEBEB" stroke="#9882AC" stroke-width="3"/>

