<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-labelledby="title desc">
<title id="title">Four software development areas</title>
<desc id="desc">Industrial monitoring, business data tools, offline OCR and full-stack local-first platforms.</desc>
