<circle cx="1380.0" cy="212" r="25" fill="#941C2F"/>
<text x="1380.0" y="220" fill="#EBEBEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">04</text>
<text x="1245" y="278" fill="#03191E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="start"><tspan x="1245" dy="0">Full-stack and local-first</tspan><tspan x="1245" dy="34">platforms</tspan></text>
<text x="1245" y="360" fill="#738290" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start"><tspan x="1245" dy="0">Authenticated applications with REST</tspan><tspan x="1245" dy="25">APIs, relational databases,</tspan><tspan x="1245" dy="25">responsive interfaces, containerized</tspan><tspan x="1245" dy="25">services and local or cloud-backed</tspan><tspan x="1245" dy="25">persistence.</tspan></text>
