</g>
<line x1="851" y1="212" x2="1137" y2="212" stroke="#738290" stroke-width="2"/>
<circle cx="1005.5" cy="212" r="25" fill="#941C2F"/>
<text x="1005.5" y="220" fill="#EBEBEB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">03</text>
<text x="860" y="278" fill="#03191E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="start"><tspan x="860" dy="0">Offline OCR and</tspan><tspan x="860" dy="34">document processing</tspan></text>
<text x="860" y="360" fill="#738290" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start"><tspan x="860" dy="0">Self-contained services for</tspan><tspan x="860" dy="25">recognizing text and codes from</tspan><tspan x="860" dy="25">logistics labels, images, PDFs and</tspan><tspan x="860" dy="25">TIFF documents without depending</tspan><tspan x="860" dy="25">on internet access.</tspan></text>
