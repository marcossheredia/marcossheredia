<svg xmlns="http://www.w3.org/2000/svg" width="720" height="210" viewBox="0 0 720 210" role="img" aria-labelledby="title desc">
  <title id="title">Offline OCR Local Service</title>
  <desc id="desc">Self-contained OCR API for logistics labels, PDFs and TIFF documents in fully offline environments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2030"/>
      <stop offset="100%" stop-color="#232838"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
  </defs>
  <rect x="7" y="7" width="706" height="196" rx="14" fill="url(#bg)" stroke="#343b50" stroke-width="2" filter="url(#shadow)"/>
  <rect x="7" y="7" width="6" height="196" rx="3" fill="#ff5c8a"/>

  <text x="38" y="50" fill="#ff5c8a" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Offline OCR Local Service</text>
  <text x="38" y="84" fill="#d7dbea" font-family="Segoe UI, Arial, sans-serif" font-size="16">Self-contained OCR API for logistics labels, PDFs</text>
  <text x="38" y="108" fill="#d7dbea" font-family="Segoe UI, Arial, sans-serif" font-size="16">and TIFF documents in fully offline environments.</text>

  <circle cx="46" cy="145" r="7" fill="#3776ab"/>
  <text x="62" y="151" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Python</text>
  <text x="38" y="180" fill="#aeb6cc" font-family="Segoe UI, Arial, sans-serif" font-size="13.5">Python · FastAPI · PaddleOCR · OpenCV · Docker</text>

  <rect x="515" y="128" width="167" height="31" rx="15.5" fill="#171b28" stroke="#4a5269"/>
  <text x="598.5" y="149" text-anchor="middle" fill="#f3c95f" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="700" letter-spacing="0.6">PRIVATE · ENGINEERING</text>
</svg>